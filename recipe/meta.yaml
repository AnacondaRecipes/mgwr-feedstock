{% set version = "2.2.1" %}

package:
  name: mgwr
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/m/mgwr/mgwr-{{ version }}.tar.gz
  sha256: 8b00ba992fd85c9528327eae88e104e072939d0d5203b72c513ef29d5c400ff7

build:
  number: 0
  # Skip Python <3.10 due to libpysal <4.10 (noarch) causing import errors with scipy >=1.8.0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  build:
    - patch  # [unix]
    - msys2-patch  # [win]
  host:
    - python
    - pip
    - wheel
    - setuptools
  run:
    - python
    # libpysal <4.10 is incompatible with scipy >=1.8.0 and leads to import errors
    # See scipy 1.8.0 release notes for details
    - libpysal >=4.10
    - numpy >=1.3
    # Upper bound scipy<1.8.0 required for scikit-learn 1.7.0 compatibility.
    # SciPy 1.8.0 removed several deprecated public APIs, including scipy.inf,
    # leading to ImportError when importing 'inf' from 'scipy'
    # See "Backwards incompatible changes" in SciPy 1.8.0 release notes:
    # https://docs.scipy.org/doc/scipy/release/1.8.0-notes.html
    - scipy >=0.11
    - spglm >=1.0.6
    - spreg

  # Skipping tests that depend on *.csv test files which are not included in 
  # the source distribution
  {% set ignore_tests = "not (" %}
  {% set ignore_tests = ignore_tests + "TestGWRGaussian or " %}
  {% set ignore_tests = ignore_tests + "TestGWRPoisson or " %}
  {% set ignore_tests = ignore_tests + "TestGWRBinomial or " %}
  {% set ignore_tests = ignore_tests + "TestGWRGaussianParallel or " %}
  {% set ignore_tests = ignore_tests + "TestGWRPoissonParallel or " %}
  {% set ignore_tests = ignore_tests + "TestGWRBinomialParallel or " %}
  {% set ignore_tests = ignore_tests + "TestGWRSelBWPoisson" %}
  {% set ignore_tests = ignore_tests + ")" %}

test:
  imports:
    - mgwr
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest --pyargs mgwr.tests -v -k "{{ ignore_tests }}"

about:
  home: https://github.com/pysal/mgwr
  dev_url: https://github.com/pysal/mgwr
  doc_url: https://mgwr.readthedocs.io
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: Multiscale geographically weighted regression
  description: |
    This module provides functionality to calibrate multiscale (M)GWR as well as traditional GWR.
    It is built upon the sparse generalized linear modeling (spglm) module.

extra:
  recipe-maintainers:
    - ocefpaf
