{% set version = "2.2.1" %}

package:
  name: mgwr
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/m/mgwr/mgwr-{{ version }}.tar.gz
  sha256: 8b00ba992fd85c9528327eae88e104e072939d0d5203b72c513ef29d5c400ff7
  patches:
    - fix_imports.patch

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  build:
    - patch  # [unix]
    - msys2-patch  # [win]
  host:
    - python
    - pip
    - wheel
    - setuptools
  run:
    - python
    - libpysal >=4.0.0
    - numpy >=1.3
    - scipy >=0.11
    - spglm >=1.0.6
    - spreg

test:
  imports:
    - mgwr
  requires:
    - pip
    - pytest
  commands:
    - pip check
    # Skipping tests below because the source dist doesn't have *csv files
    - |
      pytest mgwr/tests -v -k "not (TestGWRGaussian or TestGWRPoisson or \
      TestGWRBinomial or TestGWRGaussianParallel or TestGWRPoissonParallel or \
      TestGWRBinomialParallel or TestGWRSelBWPoisson)"
  source_files:
    - mgwr/tests


about:
  home: https://github.com/pysal/mgwr
  dev_url: https://github.com/pysal/mgwr
  doc_url: https://mgwr.readthedocs.io
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: Multiscale geographically weighted regression
  description: |
    This module provides functionality to calibrate multiscale (M)GWR as well as traditional GWR.
    It is built upon the sparse generalized linear modeling (spglm) module.

extra:
  recipe-maintainers:
    - ocefpaf
